name: Push image
description: Upload built image to AWS ECR
inputs:
  username:
    description: ghcr.io username
    required: true
  password:
    description: ghcr.io password
    required: true
  aws-arn:
    description: aws util arn
    required: true


runs:
  using: composite
  steps:
    - name: Login to GitHub Container Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ghcr.io
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@acca2b1b2070338fb9fd1ca27ecee81d687e58e5 # v6.1.2
      with:
        role-to-assume: ${{ inputs.aws-arn }}
        role-session-name: aoe-runner-ecr-push
        aws-region: eu-west-1

    - name: 03-push-image.sh
      working-directory: ./
      shell: bash
      run: ./deploy-scripts/03-push-image.sh
