server {
  listen 8080;
  server_name localhost;
  server_tokens off;
  client_max_body_size 1G;
  root   /usr/share/nginx/html;
  location / {
    index  index.html;
    try_files $uri $uri/ /index.html;
  }
  location ~ \.mjs$ {
    default_type text/javascript;
  }
  location /health {
      access_log off;
      return 200;
      add_header Content-Type text/plain;
    }
}
